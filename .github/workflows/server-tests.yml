name: Server Tests
on:
  push:
    paths: ['server/**']
  pull_request:
    paths: ['server/**']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd server && npm ci && npm test
